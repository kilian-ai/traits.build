[trait]
description = "WASM-compatible LLM agent loop — calls OpenAI API with trait-based tool calling, loops until done"
version = "v260401.101612"
checksum = "07437d3e2b437e7046a20dfce97aa84f553f10babfc780ae8d80de4b1296b793"
author = "system"
tags = ["llm", "agent", "tools", "openai", "wasm", "loop"]

[signature]
params = [
  { name = "prompt", type = "string", description = "User message to send to the agent", required = true },
  { name = "system", type = "string", description = "System prompt (default: general coding assistant)", required = false },
  { name = "tools", type = "string", description = "Comma-separated trait paths to expose as tools (default: sys.call,sys.list,sys.info,sys.checksum,kernel.call)", required = false },
  { name = "model", type = "string", description = "OpenAI model to use (default: gpt-4o-mini)", required = false, default = "gpt-4o-mini" },
  { name = "max_steps", type = "int", description = "Maximum agent loop iterations (default: 10)", required = false, default = "10" },
  { name = "api_secret", type = "string", description = "Name of the secret holding the OpenAI API key (default: openai_api_key)", required = false, default = "openai_api_key" },
]

[signature.returns]
type = "map"
description = "{ ok, response, tool_calls: [{id, name, trait, args, result}], step_count, messages }"

[implementation]
language = "rust"
source = "builtin"
entry = "agent"
wasm = true