[trait]
description = "WASM-compatible LLM agent loop — calls OpenAI API with trait-based tool calling, session compaction, usage tracking, and turn-based buddy mode"
version = "v260402.130133"
checksum = "746444320697a79c17d03d471cf15faf7f6590129aaee6edb85989551737c6d9"
author = "system"
tags = ["llm", "agent", "tools", "openai", "wasm", "loop", "buddy", "compaction"]

[signature]
params = [
  { name = "prompt", type = "string", description = "User message to send to the agent", required = true },
  { name = "system", type = "string", description = "System prompt (default: embedded traits.build agent instructions). Pass a custom prompt to override.", required = false },
  { name = "tools", type = "string", description = "Comma-separated trait paths to expose as tools (default: sys.call,sys.list,sys.registry,kernel.call,llm.agent.docs,llm.agent.skills)", required = false },
  { name = "model", type = "string", description = "OpenAI model to use (default: gpt-4o-mini)", required = false, default = "gpt-4o-mini" },
  { name = "max_steps", type = "int", description = "Maximum agent loop iterations (default: 10)", required = false, default = "10" },
  { name = "api_secret", type = "string", description = "Name of the secret holding the OpenAI API key (default: openai_api_key)", required = false, default = "openai_api_key" },
  { name = "mode", type = "string", description = "Agent mode: 'full' (run to completion) or 'turn' (single turn for buddy/companion UX)", required = false, default = "full" },
  { name = "session", type = "string", description = "Session name (default: 'default'). Use 'new' to start fresh. Can also pass a raw messages array.", required = false, default = "default" },
]

[signature.returns]
type = "map"
description = "{ ok, done, response, tool_calls, step_count, usage: {input_tokens, output_tokens, total_tokens}, compacted_messages, session }"

[implementation]
language = "rust"
source = "builtin"
entry = "agent"
wasm = true