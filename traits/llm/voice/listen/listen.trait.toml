[trait]
description = "Speech-to-text transcription using OpenAI Whisper API"
version = "v260329.221750"
checksum = "f5da9369162ba903bf469227a3862441fc022c38b416f91255fe7251d632ac8b"
author = "system"
tags = ["llm", "voice", "stt", "transcription", "audio"]

[signature]
params = [
  { name = "file", type = "string", description = "Path to audio file to transcribe (if empty, records from microphone)", required = false },
  { name = "duration", type = "int", description = "Max recording duration in seconds (default: 10, max: 30)", required = false, default = "10" },
  { name = "language", type = "string", description = "Language hint (ISO 639-1, e.g. 'en')", required = false },
]

[signature.returns]
type = "map"
description = "{ok: bool, text?: string, file?: string, error?: string}"

[implementation]
language = "rust"
source = "builtin"
entry = "listen"