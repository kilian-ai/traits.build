[trait]
description = "Interface for simple prompt→response LLM inference (prompt + model)"
version = "v260326"
author = "system"
tags = ["llm", "interface", "prompt", "inference"]
provides = ["llm/prompt"]

[signature]
params = [
  { name = "prompt", type = "string", description = "User message to send to the model", required = true },
  { name = "model", type = "string", description = "Model name (provider-specific)", required = false },
  { name = "context", type = "string", description = "Comma-separated file paths or globs to include as context", required = false },
]

[signature.returns]
type = "string"
description = "Assistant response text"

[implementation]
language = "rust"
source = "rest"
entry = "prompt"
