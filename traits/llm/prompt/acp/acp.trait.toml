[trait]
description = "Route prompts to ACP agents via chrome-acp proxy (OpenCode, Claude Code, Codex, Copilot)"
version = "v260329.170906"
checksum = "36839970048acb7693882ed7b01abeb5ac3103805bcc87dac6ac17bfd0309f9c"
author = "user"
tags = ["llm", "acp", "proxy", "opencode", "claude", "codex", "copilot"]
provides = ["llm/prompt", "llm/acp"]

[signature]
params = [
  { name = "prompt", type = "string", description = "User message to send to the ACP agent", required = true },
  { name = "agent", type = "string", description = "ACP agent: opencode, claude, codex, copilot", required = false, default = "opencode" },
  { name = "cwd", type = "string", description = "Working directory for the ACP session", required = false, default = "." },
  { name = "auto_approve", type = "boolean", description = "Automatically approve permission prompts", required = false, default = false },
  { name = "model", type = "string", description = "Model ID to use (e.g. claude-sonnet-4-5-20250514). Omit for agent default.", required = false },
  { name = "context", type = "string", description = "Comma-separated file paths or globs to include as context (e.g. 'agent.md,docs/*.md')", required = false },
]

[signature.returns]
type = "string"
description = "Agent response text"

[implementation]
language = "rust"
source = "builtin"
entry = "acp_proxy_dispatch"