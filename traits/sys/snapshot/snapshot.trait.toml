[trait]
description = "Snapshot a trait version: sets version in its .trait.toml to YYMMDD, or YYMMDD.HHMMSS if today's date is already the current version"
version = "v260322"
epoch = 0
checksum = "71a5dee8f450f1d1a560fffc3b441305946d377b08530689dcf99fd52f004a33"
author = "system"
tags = ["system", "versioning", "snapshot"]
provides = ["sys/snapshot"]

[requires]
version = "sys/version"

[bindings]
version = "sys.version"

[[signature.params]]
name = "trait_path"
type = "string"
description = "Trait path in dot notation (e.g. sys.checksum)"
example = "sys.checksum"

[signature.returns]
type = "object"
description = "{ ok, trait_path, old_version, new_version, toml_path }"

[implementation]
language = "rust"
source = "builtin"
entry = "snapshot"