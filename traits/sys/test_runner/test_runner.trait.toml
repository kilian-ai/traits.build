[trait]
description = "Generic test runner. Discovers .features.json files for traits matching a glob pattern, runs example-based tests (via internal dispatch) and shell command tests, reports structured pass/fail results."
version = "v260322.215609"
epoch = 0
checksum = "03991d27273d44be473b7cb79df596e89be253052ccab1a61374a498e5e45b88"
author = "system"
tags = ["system", "testing", "ci"]
provides = ["sys/test_runner"]

[requires]
globals = "kernel/globals"
dispatcher = "kernel/dispatcher"

[bindings]
globals = "kernel.globals"
dispatcher = "kernel.dispatcher"

[[signature.params]]
name = "pattern"
type = "string"
description = "Glob pattern: 'sys.*', '*', 'sys.checksum', etc."

[[signature.params]]
name = "verbose"
type = "boolean"
description = "If true, include full output/checks in results."
optional = true

[[signature.params]]
name = "skip_commands"
type = "boolean"
description = "If true, skip shell command tests (avoids deadlock when called via HTTP)."
optional = true

[signature.returns]
type = "object"
description = "{ ok, pattern, summary: { traits, examples, commands, skipped, total_passed, total_failed }, results }"

[implementation]
language = "rust"
source = "builtin"
entry = "test_runner"