"/llm-openai" = "www.llm.openai"
"/llm-test" = "www.llm_test"
dispatcher = "kernel.dispatcher"
secrets = "sys.secrets"

[signature]
params = [
  { name = "port", type = "int", description = "Port to listen on (default: from config)", optional = true }
]

[signature.returns]
type = "object"
