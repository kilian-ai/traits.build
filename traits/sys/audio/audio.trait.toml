author = "system"
tags = ["sys", "audio", "sound", "webaudio", "music"]

[signature]
params = [
  { name = "action", type = "string", description = "Action: tone, sequence, drum, noise, chord, sweep, stop, status", required = true, example = "tone" },
  { name = "arg1", type = "any", description = "Primary arg: freq (tone), notes array (sequence), pattern string (drum), noise type, freqs array (chord), start_freq (sweep)", required = false },
  { name = "arg2", type = "any", description = "Secondary arg: duration (tone/noise/chord), tempo (sequence), bpm (drum), end_freq (sweep)", required = false },
  { name = "arg3", type = "any", description = "Tertiary arg: waveform (tone/chord), volume (sequence/noise), loops (drum), duration (sweep)", required = false },
  { name = "arg4", type = "any", description = "Quaternary arg: volume (tone/chord/drum), waveform (sweep)", required = false },
  { name = "arg5", type = "any", description = "Quinary arg: volume (sweep)", required = false },
]

[signature.returns]
type = "map"
description = "Action descriptor with audio_action field — executed by JS bridge via WebAudio API"

[implementation]
