[trait]
description = "Make outbound HTTP/REST API calls. Supports JSON APIs with Bearer auth via secrets store."
version = "v260323.161923"
checksum = "4b1b4fc2bccbd4c4217f50ebd4e093dd88ddaa66245e8899abf523778c093a51"
epoch = 0
author = "system"
tags = ["system", "http", "rest", "api", "call"]

[[signature.params]]
name = "url"
type = "string"
description = "Full URL to call (e.g. https://api.openai.com/v1/chat/completions)"
required = true

[[signature.params]]
name = "body"
type = "any"
description = "Request body — object/string sent as JSON"
required = false

[[signature.params]]
name = "auth_secret"
type = "string"
description = "Secret ID for Bearer token auth (looked up in secrets store, falls back to env var with same name uppercased)"
required = false

[[signature.params]]
name = "method"
type = "string"
description = "HTTP method: GET, POST, PUT, PATCH, DELETE (default: POST if body given, GET otherwise)"
required = false

[[signature.params]]
name = "headers"
type = "any"
description = "Additional headers as {key: value} object"
required = false

[signature.returns]
type = "any"
description = "{ ok, status, body } — body is parsed JSON if Content-Type is application/json, otherwise raw string"

[implementation]
language = "rust"
source = "builtin"
entry = "call"