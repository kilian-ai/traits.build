[trait]
description = "3D Gaussian splat viewer using WebGPU — fetches and renders real .splat files with orbit camera, depth sorting, and scene gallery"
version = "v260402"
checksum = "a2a7cdd80c4ee00e0c5111a75bee2d1c44783bac514ae186d10abb461ed5b674"
author = "system"
tags = ["www", "splats", "webgpu", "3d", "gaussian"]

[signature]
params = [
  { name = "action", type = "string", description = "Action: render (returns HTML viewer), gallery (returns list of example scenes)", required = false, default = "render", example = "render" },
  { name = "url", type = "string", description = "URL to a .splat binary file to load (default: bonsai-7k-mini)", required = false, default = "", example = "https://huggingface.co/datasets/dylanebert/3dgs/resolve/main/bonsai/bonsai-7k-mini.splat" },
]

[signature.returns]
type = "string"
description = "HTML page with WebGPU Gaussian splat renderer, or gallery JSON"

[implementation]
language = "rust"
source = "builtin"
entry = "splats"
wasm = true