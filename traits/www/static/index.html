<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>traits.build</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--fg:#e8e6e3;--accent:#6c63ff;--accent2:#00d4aa;--muted:#6b7280;--card:#12121a;--border:#1e1e2e}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--fg);line-height:1.6}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Shell nav ── */
#shell-nav{position:sticky;top:0;z-index:9999;background:rgba(10,10,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;height:48px;gap:2rem}
#shell-nav .logo{font-weight:800;font-size:1.05rem;letter-spacing:-0.02em;cursor:pointer}
#shell-nav .logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#shell-nav .links{display:flex;gap:1.25rem;font-size:0.88rem}
#shell-nav .links a{color:var(--muted);transition:color 0.15s;cursor:pointer}
#shell-nav .links a:hover,#shell-nav .links a.active{color:var(--fg);text-decoration:none}
#shell-nav .status{margin-left:auto;font-size:0.78rem;color:var(--muted)}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}
.dot.ok{background:var(--accent2)}
.dot.loading{background:var(--muted);animation:pulse 1s infinite}
.dot.off{background:#f44}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Page frame ── */
#page-frame{min-height:calc(100vh - 48px)}

/* ── Loading overlay ── */
#boot-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10000;transition:opacity 0.3s}
#boot-overlay.hidden{opacity:0;pointer-events:none}
#boot-overlay .spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
#boot-overlay p{margin-top:1rem;color:var(--muted);font-size:0.9rem}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  #shell-nav{padding:0 1rem;gap:0.75rem}
  #shell-nav .links{gap:0.75rem;font-size:0.82rem}
}
</style>
</head>
<body>

<div id="boot-overlay">
  <div class="spinner"></div>
  <p>Loading WASM kernel…</p>
</div>

<nav id="shell-nav" style="display:none">
  <div class="logo" data-href="/"><span>traits</span>.build</div>
  <div class="links">
    <a data-href="/" class="active">Home</a>
    <a data-href="/docs">Docs</a>
    <a data-href="/docs/api">API</a>
    <a data-href="/settings">Settings</a>
  </div>
  <div class="status">
    <span class="dot loading" id="statusDot"></span>
    <span id="statusText">loading…</span>
  </div>
</nav>

<div id="page-frame"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// SPA Bootloader — loads WASM kernel, routes URLs to www.* traits
// Page JS uses window._traitsSDK for all trait calls
// (WASM-first, REST-fallback — transparent to pages)
// ═══════════════════════════════════════════════════════════════

// ── Route table (mostly mirrors serve.trait.toml bindings; /admin is SPA-specific) ──
const ROUTES = {
  '/':         'www.traits.build',
  '/docs':     'www.docs',
  '/docs/api': 'www.docs.api',
  '/chat-logs':'www.chat_logs',
  '/admin':    'www.admin.spa',
  '/settings': 'www.admin.spa',
};

const LOCAL_ROUTE_KEY = 'traits.shell.route';

const isLocal = location.protocol === 'file:';

function runtimeScriptPath() {
  if (isLocal) return `./wasm-runtime.js?v=${Date.now()}`;
  return '/static/www/static/wasm-runtime.js';
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const existing = document.querySelector(`script[data-runtime-src="${src}"]`);
    if (existing) {
      if (window.TraitsWasm) resolve();
      else existing.addEventListener('load', () => resolve(), { once: true });
      return;
    }
    const script = document.createElement('script');
    script.src = src;
    script.async = true;
    script.dataset.runtimeSrc = src;
    script.onload = () => resolve();
    script.onerror = () => reject(new Error(`Failed to load runtime: ${src}`));
    document.head.appendChild(script);
  });
}

function decodeBase64Bytes(base64) {
  const bin = atob(base64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

// ── Minimal SDK (inlined for zero-dependency boot) ──
// Dispatch cascade: WASM local → helper (localhost) → server REST → error
let wasm = null, wasmReady = false;
const wasmCallableSet = new Set();

// ── Local Helper (privileged trait runtime on localhost) ──
let helperUrl = null;      // e.g. "http://localhost:8090"
let helperReady = false;
let helperInfo = null;     // { status, version, trait_count, ... }
const HELPER_PORTS = [8090, 8091, 9090]; // Discovery ports to try
const HELPER_TIMEOUT = 1500; // ms per probe

async function probeHelper(url, timeout = HELPER_TIMEOUT) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeout);
  try {
    const res = await fetch(`${url}/health`, { signal: ctrl.signal });
    clearTimeout(timer);
    if (res.ok) {
      const data = await res.json();
      return data;
    }
  } catch(e) { clearTimeout(timer); }
  return null;
}

async function discoverHelper() {
  // Try stored helper URL first
  try {
    const stored = localStorage.getItem('traits.helper.url');
    if (stored) {
      const info = await probeHelper(stored, 1000);
      if (info) { helperUrl = stored; helperInfo = info; helperReady = true; return; }
    }
  } catch(e) {}

  // Auto-discover on common ports
  for (const port of HELPER_PORTS) {
    const url = `http://localhost:${port}`;
    const info = await probeHelper(url);
    if (info) {
      helperUrl = url; helperInfo = info; helperReady = true;
      try { localStorage.setItem('traits.helper.url', url); } catch(e) {}
      return;
    }
  }
}

async function callHelper(path, args) {
  if (!helperReady) return null;
  const rest = path.replace(/\./g, '/');
  try {
    const res = await fetch(`${helperUrl}/traits/${rest}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ args }),
    });
    const data = await res.json();
    return {
      ok: res.ok,
      result: res.ok ? data.result : undefined,
      error: res.ok ? undefined : (data.error || `HTTP ${res.status}`),
      dispatch: 'helper',
      ms: 0,
    };
  } catch(e) {
    return null; // Helper unreachable — cascade continues
  }
}

class TraitsSDK {
  constructor() { this._origin = location.origin; }

  async call(path, args = []) {
    const t0 = performance.now();

    // 1. Try WASM (instant, local)
    if (wasmReady && wasmCallableSet.has(path)) {
      try {
        const raw = wasm.call(path, JSON.stringify(args));
        return { ok: true, result: JSON.parse(raw), dispatch: 'wasm',
                 ms: Math.round((performance.now() - t0) * 10) / 10 };
      } catch(e) {
        return { ok: false, error: e.message || String(e), dispatch: 'wasm' };
      }
    }

    // 2. Try local helper (privileged traits on localhost)
    if (helperReady) {
      const helperResult = await callHelper(path, args);
      if (helperResult) {
        helperResult.ms = Math.round((performance.now() - t0) * 10) / 10;
        return helperResult;
      }
    }

    // 3. Try server REST (when served from traits.build, not file://)
    if (!isLocal) {
      const rest = path.replace(/\./g, '/');
      try {
        const res = await fetch(`${this._origin}/traits/${rest}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ args }),
        });
        const data = await res.json();
        return {
          ok: res.ok,
          result: res.ok ? data.result : undefined,
          error: res.ok ? undefined : (data.error || `HTTP ${res.status}`),
          dispatch: 'rest',
          ms: Math.round((performance.now() - t0) * 10) / 10,
        };
      } catch(e) {
        return { ok: false, error: e.message || String(e), dispatch: 'rest' };
      }
    }

    // 4. No dispatch path available
    return { ok: false, error: `Trait '${path}' requires local helper. Run: npx traits-helper`, dispatch: 'none' };
  }

  /** Connect to a specific helper URL (overrides auto-discovery). */
  async connectHelper(url) {
    const info = await probeHelper(url);
    if (info) {
      helperUrl = url.replace(/\/$/, '');
      helperInfo = info;
      helperReady = true;
      try { localStorage.setItem('traits.helper.url', helperUrl); } catch(e) {}
      return { ok: true, ...info };
    }
    return { ok: false, error: 'Helper not reachable at ' + url };
  }

  isCallable(path) { return wasmReady && wasmCallableSet.has(path); }
  dispatchMode(path) {
    if (wasmReady && wasmCallableSet.has(path)) return 'wasm';
    if (helperReady) return 'helper';
    if (!isLocal) return 'rest';
    return 'none';
  }

  async list() {
    if (wasmReady) return JSON.parse(wasm.list_traits());
    if (helperReady) {
      try { const r = await fetch(`${helperUrl}/traits`); return r.json(); } catch(e) {}
    }
    if (!isLocal) { const r = await fetch(`${this._origin}/traits`); return r.json(); }
    return [];
  }

  async info(path) {
    if (wasmReady) {
      const raw = wasm.get_trait_info(path);
      return raw ? JSON.parse(raw) : null;
    }
    const rest = path.replace(/\./g, '/');
    if (helperReady) {
      try { const r = await fetch(`${helperUrl}/traits/${rest}`); if (r.ok) return r.json(); } catch(e) {}
    }
    if (!isLocal) {
      const res = await fetch(`${this._origin}/traits/${rest}`);
      return res.ok ? res.json() : null;
    }
    return null;
  }

  async search(query) {
    if (wasmReady) return JSON.parse(wasm.search_traits(query));
    const all = await this.list();
    const q = query.toLowerCase();
    return all.filter(t => t.path?.toLowerCase().includes(q) || t.description?.toLowerCase().includes(q));
  }

  get callableTraits() { return [...wasmCallableSet]; }
  get helperConnected() { return helperReady; }
  get helperStatus() { return helperReady ? { url: helperUrl, ...helperInfo } : null; }
  get status() {
    return { wasm: wasmReady, callable: wasmCallableSet.size, helper: helperReady, helperUrl };
  }
}

const sdk = new TraitsSDK();
window._traitsSDK = sdk;

// ── Trait Components — declarative data-trait → DOM binding ──
//
// Attributes on any element:
//   data-trait="sys.list"          trait path to call
//   data-call="mount|click"        trigger (default: mount)
//   data-args='["x"]'              JSON call args
//   data-bind="field.path"         dot-path into result to extract
//   data-render="text|html|json"   output mode (default: text)
//   data-target="#id"              render into another element (default: self)
//   data-interval="30000"          auto-refresh interval in ms
//   data-handler="name"            custom handler fn(el, value, meta)
//   data-loading="…"               placeholder text while loading

const TC = (() => {
  const _h = {};      // named handlers: { name: fn(el, value, meta) }
  const _iv = [];     // active setInterval IDs
  const _cl = [];     // cleanup fns (removeEventListener etc.)

  function on(name, fn) { _h[name] = fn; }

  // Resolve dot-path: "items.length", "version", "0.name"
  function _get(obj, path) {
    if (!path) return obj;
    for (const k of path.split('.')) {
      if (obj == null) return undefined;
      if (k === 'length' && (Array.isArray(obj) || typeof obj === 'string'))
        return obj.length;
      obj = typeof obj === 'object' ? obj[k] : undefined;
    }
    return obj;
  }

  async function call(el) {
    const path = el.dataset.trait;
    if (!path) return;
    const args = el.dataset.args ? JSON.parse(el.dataset.args) : [];
    const target = el.dataset.target
      ? document.querySelector(el.dataset.target) : el;
    if (el.dataset.loading && target) target.textContent = el.dataset.loading;

    const res = await sdk.call(path, args);

    if (!res.ok) {
      el.dispatchEvent(new CustomEvent('trait:error',
        { detail: res, bubbles: true }));
      return res;
    }

    // Custom handler gets full control
    const hName = el.dataset.handler;
    if (hName && _h[hName]) {
      await _h[hName](el, res.result, res);
    } else if (target) {
      // Auto-bind: extract value, apply to target
      const val = _get(res.result, el.dataset.bind);
      const mode = el.dataset.render || 'text';
      if (mode === 'html') target.innerHTML = String(val ?? '');
      else if (mode === 'json')
        target.textContent = JSON.stringify(val, null, 2);
      else target.textContent = String(val ?? '-');
    }

    el.dispatchEvent(new CustomEvent('trait:done',
      { detail: res, bubbles: true }));
    return res;
  }

  function scan(root) {
    if (!root?.querySelectorAll) return;
    const els = [...root.querySelectorAll('[data-trait]')];
    if (root.dataset?.trait) els.unshift(root);

    for (const el of els) {
      if (el._tc) continue;     // already bound
      el._tc = true;
      const trigger = el.dataset.call || 'mount';

      if (trigger === 'mount') {
        call(el);
        const ms = parseInt(el.dataset.interval);
        if (ms > 0) _iv.push(setInterval(() => call(el), ms));
      } else if (trigger === 'click') {
        const fn = (e) => { e.preventDefault(); call(el); };
        el.addEventListener('click', fn);
        _cl.push(() => el.removeEventListener('click', fn));
      }
    }
  }

  function cleanup() {
    _iv.forEach(id => clearInterval(id));
    _iv.length = 0;
    _cl.forEach(fn => fn());
    _cl.length = 0;
    for (const k of Object.keys(_h)) delete _h[k];
  }

  return { on, call, scan, cleanup };
})();
window.TC = TC;

// ── DOM refs ──
const $ = s => document.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const overlay = $('#boot-overlay');
const nav = $('#shell-nav');
const frame = $('#page-frame');
const dot = $('#statusDot');
const statusText = $('#statusText');

// ── Page rendering ──
// Inject page HTML from a trait call into the frame.
// Extracts <body> content from the full HTML document returned by the trait.
// Handles <style> and <script> tags properly.

let currentPageCleanup = null;

async function injectPage(fullHtml, route) {
  // Clean up previous page
  TC.cleanup();
  if (currentPageCleanup) { currentPageCleanup(); currentPageCleanup = null; }
  document.querySelectorAll('style[data-page]').forEach(s => s.remove());
  document.querySelectorAll('link[data-page]').forEach(l => l.remove());
  document.querySelectorAll('body > .terminal-wrap').forEach(t => t.remove());
  frame.style.paddingBottom = '';

  const parser = new DOMParser();
  const doc = parser.parseFromString(fullHtml, 'text/html');

  // Extract and inject <style> tags from <head>
  doc.querySelectorAll('head style').forEach(style => {
    const s = document.createElement('style');
    s.dataset.page = route;
    s.textContent = style.textContent;
    document.head.appendChild(s);
  });

  // Extract and inject <link> tags from <head>
  doc.querySelectorAll('head link[rel="stylesheet"]').forEach(link => {
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = link.href;
    l.dataset.page = route;
    document.head.appendChild(l);
  });

  // Set body content
  frame.innerHTML = doc.body.innerHTML;

  // Execute scripts IN ORDER — await external scripts before running inline ones
  const scripts = [...frame.querySelectorAll('script')];
  for (const old of scripts) {
    const s = document.createElement('script');
    for (const attr of old.attributes) {
      // Skip type="module" for file:// mode — dynamic import() from absolute paths fails
      if (attr.name === 'type' && attr.value === 'module' && isLocal) continue;
      s.setAttribute(attr.name, attr.value);
    }
    s.textContent = old.textContent;

    if (s.src) {
      // External script — wait for it to load before continuing
      await new Promise((resolve) => {
        s.onload = resolve;
        s.onerror = () => { console.warn('Script load failed:', s.src); resolve(); };
        old.replaceWith(s);
      });
    } else {
      old.replaceWith(s);
    }
  }

  // Pick up page cleanup callback if set by page scripts
  currentPageCleanup = window._pageCleanup || null;
  window._pageCleanup = null;

  // Activate trait components declared via data-trait attributes
  TC.scan(frame);

  // Update nav active state
  $$('#shell-nav .links a').forEach(a => {
    a.classList.toggle('active', a.dataset.href === route);
  });

  // Update document title from the page
  const pageTitle = doc.querySelector('title');
  if (pageTitle) document.title = pageTitle.textContent;

  // Move terminal-wrap out of frame to body (needs position:fixed on viewport)
  const termWrap = frame.querySelector('.terminal-wrap');
  if (termWrap) {
    // Remove any previous terminal from body
    document.querySelectorAll('body > .terminal-wrap').forEach(t => t.remove());
    document.body.appendChild(termWrap);
    // Give frame padding so content doesn't hide behind fixed terminal
    frame.style.paddingBottom = '340px';
  } else {
    frame.style.paddingBottom = '';
  }
}

function currentRouteFromLocation() {
  if (isLocal) {
    const hash = location.hash.slice(1) || '/';
    if (ROUTES[hash]) {
      try { sessionStorage.setItem(LOCAL_ROUTE_KEY, hash); } catch(e) {}
      return hash;
    }
    try {
      const storedRoute = sessionStorage.getItem(LOCAL_ROUTE_KEY);
      if (storedRoute && ROUTES[storedRoute]) return storedRoute;
    } catch(e) {}
    return '/';
  }
  const path = location.pathname === '' || location.pathname === '/static' ? '/' : location.pathname;
  return ROUTES[path] ? path : '/';
}

// ── Router ──
let currentRoute = null;

async function navigate(route, pushState = true) {
  if (route === currentRoute) return;
  currentRoute = route;

  const traitPath = ROUTES[route];
  if (!traitPath) {
    frame.innerHTML = '<div style="padding:4rem;text-align:center;color:var(--muted)"><h2>404</h2><p>Page not found: ' + route + '</p></div>';
    return;
  }

  // Show a brief loading state for slow pages
  frame.style.opacity = '0.6';

  const result = await sdk.call(traitPath, []);

  frame.style.opacity = '1';

  if (result.ok && typeof result.result === 'string') {
    await injectPage(result.result, route);
  } else {
    frame.innerHTML = '<div style="padding:4rem;text-align:center;color:#f44"><h2>Error loading page</h2><p>' +
      (result.error || 'Unknown error') + '</p><p style="color:var(--muted);margin-top:0.5rem">Trait: ' + traitPath +
      ' · Dispatch: ' + (result.dispatch || '?') + '</p></div>';
  }

  if (pushState) {
    if (isLocal) {
      try { sessionStorage.setItem(LOCAL_ROUTE_KEY, route); } catch(e) {}
      history.pushState({ route }, '', '#' + route);
    }
    else history.pushState({ route }, '', route);
  }
}

// ── Nav click handling ──
nav.addEventListener('click', e => {
  const el = e.target.closest('[data-href]');
  if (!el) return;
  e.preventDefault();
  navigate(el.dataset.href);
});

// ── Global link interceptor (makes internal links work in file:// mode) ──
document.addEventListener('click', e => {
  const a = e.target.closest('a[href]');
  if (!a) return;
  const href = a.getAttribute('href');
  if (href && ROUTES[href]) {
    e.preventDefault();
    navigate(href);
  }
});

// ── Browser back/forward ──
window.addEventListener('popstate', e => {
  const route = e.state?.route || currentRouteFromLocation();
  navigate(route, false);
});

window.addEventListener('hashchange', () => {
  if (!isLocal) return;
  const hash = location.hash.slice(1);
  if (hash && ROUTES[hash]) navigate(hash, false);
});

function updateStatusBar() {
  const parts = [];
  if (wasmReady) parts.push(`WASM (${wasmCallableSet.size})`);
  if (helperReady) parts.push(`helper`);
  else if (!isLocal) parts.push('REST');

  if (wasmReady || helperReady) {
    dot.className = 'dot ok';
  } else if (!isLocal) {
    dot.className = 'dot ok';
  } else {
    dot.className = 'dot off';
  }
  statusText.textContent = parts.join(' + ') || 'offline';
}

// ── Boot sequence ──
async function boot() {
  // Start helper discovery in parallel with WASM init (non-blocking)
  const helperPromise = discoverHelper();

  try {
    await loadScript(runtimeScriptPath());
    const mod = window.TraitsWasm;
    if (!mod) throw new Error('TraitsWasm runtime missing');
    mod.initSync(decodeBase64Bytes(mod.WASM_BASE64));
    const info = JSON.parse(mod.init());
    JSON.parse(mod.callable_traits()).forEach(p => wasmCallableSet.add(p));
    wasm = mod;
    wasmReady = true;

    // Pre-load terminal as classic script (import() blocked in file:// mode)
    try {
      const termSrc = isLocal ? `./terminal-runtime.js?v=${Date.now()}` : '/static/www/static/terminal-runtime.js';
      await loadScript(termSrc);
    } catch(e) { console.warn('Terminal pre-load failed:', e); }
  } catch(e) {
    console.warn('WASM init failed:', e);
  }

  // Wait for helper discovery to finish (has its own timeout)
  await helperPromise;

  // Re-probe helper every second (detect connect/disconnect)
  setInterval(async () => {
    if (helperReady) {
      // Verify still alive
      const info = await probeHelper(helperUrl, 1000);
      if (!info) { helperReady = false; helperUrl = null; helperInfo = null; updateStatusBar(); }
    } else {
      await discoverHelper();
      if (helperReady) updateStatusBar();
    }
  }, 1000);

  updateStatusBar();

  // Show nav, hide overlay
  nav.style.display = '';
  overlay.classList.add('hidden');
  setTimeout(() => overlay.remove(), 300);

  // Route to initial page
  const route = currentRouteFromLocation();
  await navigate(route, false);
}

boot();
</script>
</body>
</html>
