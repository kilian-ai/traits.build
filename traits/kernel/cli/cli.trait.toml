[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260329.231834"
checksum = "dde6e613d0d92b9d0669ba7e00e12b4bd96df60ef1e95b404050bb2dd3c4927b"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false