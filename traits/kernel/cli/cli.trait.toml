[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260325"
checksum = "f358f89a5d87bc0b67b37564bbeb2b1a24dc3340bb4a99d588094109c83fa58a"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"