[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260327.161934"
checksum = "d68d60f6d8113224560a778df039cb743db48d1c73964af284170a04ea5fe1c5"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false