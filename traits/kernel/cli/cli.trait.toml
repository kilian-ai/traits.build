[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260328.005105"
checksum = "5bd92be73be955d787ed7238107ebef8e74c35e3a3e5a5a8f0f8ceb1b6f0e4c3"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false