[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260329.234002"
checksum = "c08695b1bdc7fbbc5f416ce825f112c4d5b930f009c65c53c61fa60d2b4ea63c"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false