[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260326"
checksum = "76d3d0b53599f09a758f7af785f90fd9f2e54ddbd0ed6a71a3a6c9f7f16f4be8"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false