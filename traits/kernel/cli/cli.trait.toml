[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260327.234003"
checksum = "89924f6c45a5ee4f68825c1f61efb228022f65c559266cb48066dc8492cbcc52"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false