[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260327.163040"
checksum = "31cf964087144292a4ce1471c9dc1686c9caf7fd546cdcd4f0cad567c017a2e9"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false