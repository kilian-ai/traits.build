[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260330.021809"
checksum = "9cea847e3319a6f177b0f1d295c769434b2db43dd99b2ba12e0c2ac1068d1cd9"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false