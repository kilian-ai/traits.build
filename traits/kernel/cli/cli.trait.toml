[trait]
description = "Portable CLI command processor — shared between WASM and native targets"
version = "v260327.214652"
checksum = "c4c640ac20c3befc316b05b8cccbbcc2c4f6b22b66d4d33cc4f1bc117d0f67d4"
author = "system"
tags = ["kernel", "cli"]
provides = ["kernel/cli"]

[requires]
native = "cli/backend"
wasm = "cli/backend"

[bindings]
native = "sys.cli.native"
wasm = "sys.cli.wasm"

[signature]
params = [
    { name = "line", type = "string", description = "Command line to execute", required = true },
]

[signature.returns]
type = "string"
description = "ANSI-formatted output text"

[implementation]
language = "rust"
source = "builtin"
entry = "cli_dispatch"
wasm = true
wasm_callable = false