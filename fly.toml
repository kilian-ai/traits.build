app = "polygrait-api"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  TRAITS_PORT = "8090"
  TRAITS_BIND = "0.0.0.0"
  RUST_LOG = "info"
  FLY_APP = "polygrait-api"
  FLY_REGION = "iad"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  max_machines_running = 2

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = "traits_data"
  destination = "/data"

[deploy]
  release_command = "/bin/echo 'Polygrait API ready'"