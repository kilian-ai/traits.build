<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bouncing 6-Point Star</title>
<style>body{background:#0a0a0a;margin:0;overflow:hidden}canvas{display:block}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas=document.getElementById("c"),ctx=canvas.getContext("2d");
canvas.width=innerWidth;canvas.height=innerHeight;
addEventListener("resize",()=>{canvas.width=innerWidth;canvas.height=innerHeight});
const s={x:canvas.width/2,y:canvas.height/2,r:40,dx:3,dy:2.5};
function draw(cx,cy,r){
  const ir=r*0.5;ctx.fillStyle="#e22";ctx.strokeStyle="#ff4444";ctx.lineWidth=2;
  ctx.beginPath();
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6-Math.PI/2,R=i%2===0?r:ir;
    const px=cx+R*Math.cos(a),py=cy+R*Math.sin(a);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
}
function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  draw(s.x,s.y,s.r);s.x+=s.dx;s.y+=s.dy;
  if(s.x+s.r>canvas.width||s.x-s.r<0)s.dx*=-1;
  if(s.y+s.r>canvas.height||s.y-s.r<0)s.dy*=-1;
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
